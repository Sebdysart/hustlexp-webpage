# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/
#
# Note on --build-arg: the Dockerfile bakes all VITE_* env vars into the
# Vite bundle at build time. The .dockerignore excludes .env files, so
# each VITE_* MUST be passed explicitly as a --build-arg here. Missing
# ones bake as empty strings, silently breaking features (Firebase
# waitlist, Supabase client, Tally embed, etc.).

name: Fly Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group    # ensure only one deploy runs at a time
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: flyctl deploy
        run: |
          flyctl deploy --remote-only \
            --build-arg VITE_FIREBASE_API_KEY="$VITE_FIREBASE_API_KEY" \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN="$VITE_FIREBASE_AUTH_DOMAIN" \
            --build-arg VITE_FIREBASE_PROJECT_ID="$VITE_FIREBASE_PROJECT_ID" \
            --build-arg VITE_FIREBASE_STORAGE_BUCKET="$VITE_FIREBASE_STORAGE_BUCKET" \
            --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID="$VITE_FIREBASE_MESSAGING_SENDER_ID" \
            --build-arg VITE_FIREBASE_APP_ID="$VITE_FIREBASE_APP_ID" \
            --build-arg VITE_FIREBASE_MEASUREMENT_ID="$VITE_FIREBASE_MEASUREMENT_ID" \
            --build-arg VITE_SUPABASE_URL="$VITE_SUPABASE_URL" \
            --build-arg VITE_SUPABASE_ANON_KEY="$VITE_SUPABASE_ANON_KEY" \
            --build-arg VITE_TALLY_FORM_CUSTOMER="$VITE_TALLY_FORM_CUSTOMER" \
            --build-arg VITE_TALLY_FORM_HUSTLER="$VITE_TALLY_FORM_HUSTLER" \
            --build-arg VITE_TALLY_FORM_WAITLIST="$VITE_TALLY_FORM_WAITLIST" \
            --build-arg VITE_CONSENT_VERSION="$VITE_CONSENT_VERSION" \
            --build-arg VITE_GO_LIVE_THRESHOLD="$VITE_GO_LIVE_THRESHOLD" \
            --build-arg VITE_BACKEND_OPS_ENDPOINT="$VITE_BACKEND_OPS_ENDPOINT" \
            --build-arg VITE_GA4_MEASUREMENT_ID="$VITE_GA4_MEASUREMENT_ID"
        env:
          FLY_API_TOKEN:                        ${{ secrets.FLY_API_TOKEN }}
          VITE_FIREBASE_API_KEY:                ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:            ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:             ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:         ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID:    ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:                 ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID:         ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_SUPABASE_URL:                    ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:               ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TALLY_FORM_CUSTOMER:             ${{ secrets.VITE_TALLY_FORM_CUSTOMER }}
          VITE_TALLY_FORM_HUSTLER:              ${{ secrets.VITE_TALLY_FORM_HUSTLER }}
          VITE_TALLY_FORM_WAITLIST:             ${{ secrets.VITE_TALLY_FORM_WAITLIST }}
          VITE_CONSENT_VERSION:                 v1
          VITE_GO_LIVE_THRESHOLD:               "25"
          VITE_BACKEND_OPS_ENDPOINT:            ${{ secrets.VITE_BACKEND_OPS_ENDPOINT }}
          VITE_GA4_MEASUREMENT_ID:              ${{ secrets.VITE_GA4_MEASUREMENT_ID }}
