# HustleXP SPA server — nginx config.
#
# Phase A upgrades (vs. the earlier patch baseline):
#   - Added gzip compression for text assets.
#   - Added HSTS, CSP-Report-Only, COOP, full Permissions-Policy.
#   - Flipped X-Frame-Options SAMEORIGIN -> DENY (no same-origin iframes).
#   - Fixed /assets/ prefix priority via ^~ so hashed PNGs/fonts under
#     /assets/ get the 1y immutable policy, not the 1d regex policy.
#   - Moved Cache-Control to a map so all security headers stay on every
#     response (nginx's add_header inheritance replaces parent directives
#     whenever a child location sets its own — computing Cache-Control
#     upstream keeps headers applied at server scope only).
#
# CSP is report-only. Firebase origins are enumerated; Google Fonts are
# allowed in style-src/font-src because index.html includes a fonts.g.c
# stylesheet link. CSP violations will surface in DevTools during the
# post-deploy soak and inform the enforcement cutover.

# Cache policy by normalized URI. `map` belongs in http context and
# default.conf is included inside http by the base image's nginx.conf.
map $uri $hxp_cache_control {
    ~^/assets/                                               "public, max-age=31536000, immutable";
    ~*\.(?:ico|png|jpg|jpeg|svg|webp|avif|woff2?|ttf|txt|xml)$ "public, max-age=86400";
    ~^/healthz$                                              "no-store";
    default                                                  "no-store, must-revalidate";
}

server {
    listen       8043;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compression. Brotli needs a separate module not in nginx:alpine —
    # gzip alone is a 60–70% win on text assets and ships in the base
    # image. Revisit brotli in a later phase.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    # Security + privacy headers applied to every response. The `always`
    # parameter keeps them on error responses too.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), usb=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://images.unsplash.com; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://*.firebaseapp.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Cache-Control $hxp_cache_control always;

    # Hashed Vite assets — ^~ priority beats the regex policy for
    # /assets/*.png etc. No add_header here so the server-level set is
    # inherited intact (any add_header inside a location block would
    # replace ALL inherited add_header directives — classic nginx trap).
    location ^~ /assets/ {
        try_files $uri =404;
    }

    # SPA fallback. try_files rewrites $uri to /index.html for unknown
    # routes; the map then resolves Cache-Control against /index.html
    # and lands on "no-store, must-revalidate". Deep routes like /careers
    # get no-cache correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fly health check.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # Hide dotfiles.
    location ~ /\. {
        deny all;
    }
}
